name: Bug Report
description: Something isn't working as expected
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please fill out the sections below as thoroughly as possible so we can reproduce and fix the issue quickly.

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
      placeholder: Describe what went wrong.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: Exact steps to reliably reproduce the bug.
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Affected area
      options:
        - Frontend (apps/web)
        - API / backend (apps/api)
        - Impact engine (packages/impact-engine)
        - Database / migrations (packages/db)
        - Shared types / schemas (packages/shared)
        - Job queue / data ingestion
        - Infrastructure / deployment
        - Not sure
    validations:
      required: true

  - type: input
    id: node-version
    attributes:
      label: Node.js version
      placeholder: "e.g. 20.12.0"
    validations:
      required: false

  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: "e.g. Windows 11, Ubuntu 22.04, macOS 14"
    validations:
      required: false

  - type: input
    id: browser
    attributes:
      label: Browser (if frontend issue)
      placeholder: "e.g. Chrome 123, Firefox 124"
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or error output
      description: Paste any relevant console output, stack traces, or API error responses. This field is automatically formatted as code.
      render: shell

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Screenshots, links, or any other information that might be helpful.
