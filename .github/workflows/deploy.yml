# =============================================================================
# deploy.yml
# Builds API + Web Docker images, pushes to ACR, then updates each
# Azure App Service instance to run the new image.
#
# Required GitHub Secrets:
#   ACR_LOGIN_SERVER        — e.g. acrfuelripplewforddev.azurecr.io
#   ACR_USERNAME            — ACR admin username
#   ACR_PASSWORD            — ACR admin password
#   AZUREAPPSERVICE_CLIENTID_19B9CF6E5E8F4F62B5FD4D18E54C5600
#   AZUREAPPSERVICE_TENANTID_2C00FBAC276C4F1ABC367E552374A0CA
#   AZUREAPPSERVICE_SUBSCRIPTIONID_43645EA172E34549B2664D9DDDEFE163
#   DATABASE_URL            — Full PostgreSQL connection string (migrations)
# =============================================================================

name: Build + Deploy

on:
  push:
    branches:
      - main
    paths:
      - 'apps/**'
      - 'packages/**'
      - 'package.json'
      - 'package-lock.json'
      - 'turbo.json'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - prod
      image_tag:
        description: 'Custom image tag (defaults to git SHA)'
        required: false
        default: ''
      push_latest:
        description: 'Also tag and push as :latest'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

env:
  RESOURCE_GROUP: FuelRippleRG

jobs:
  # ---------------------------------------------------------------------------
  # Job: test
  # Full test suite must pass before images are built.
  # ---------------------------------------------------------------------------
  test:
    name: Test
    runs-on: ubuntu-latest
    permissions:
      contents: read

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: fuelripple_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests with coverage
        run: npm run test:coverage
        env:
          DATABASE_URL: postgres://test_user:test_password@localhost:5432/fuelripple_test
          REDIS_URL: redis://localhost:6379
          NODE_ENV: test

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/
          retention-days: 14

  # ---------------------------------------------------------------------------
  # Job: setup
  # Resolves environment, ACR host, and image tag.
  # ---------------------------------------------------------------------------
  setup:
    name: Setup
    runs-on: ubuntu-latest
    needs: test
    outputs:
      environment: ${{ steps.resolve.outputs.environment }}
      acr_host: ${{ steps.resolve.outputs.acr_host }}
      image_tag: ${{ steps.resolve.outputs.image_tag }}
      push_latest: ${{ steps.resolve.outputs.push_latest }}

    steps:
      - name: Resolve environment and image tag
        id: resolve
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            ENV="${{ github.event.inputs.environment }}"
            PUSH_LATEST="${{ github.event.inputs.push_latest }}"
          else
            ENV="dev"
            PUSH_LATEST="true"
          fi

          if [[ "$ENV" == "prod" ]]; then
            ACR_HOST="acrfuelripplewfordprod.azurecr.io"
          else
            ACR_HOST="acrfuelripplewforddev.azurecr.io"
          fi

          INPUT_TAG="${{ github.event.inputs.image_tag }}"
          SHORT_SHA="${GITHUB_SHA::8}"
          TAG="${INPUT_TAG:-$SHORT_SHA}"

          echo "environment=$ENV" >> $GITHUB_OUTPUT
          echo "acr_host=$ACR_HOST" >> $GITHUB_OUTPUT
          echo "image_tag=$TAG" >> $GITHUB_OUTPUT
          echo "push_latest=$PUSH_LATEST" >> $GITHUB_OUTPUT
          echo "Resolved: env=$ENV  tag=$TAG  acr=$ACR_HOST"

  # ---------------------------------------------------------------------------
  # Job: build-and-push
  # Builds API and Web Docker images and pushes to ACR.
  # ---------------------------------------------------------------------------
  build-and-push:
    name: Build & Push (${{ matrix.app }})
    needs: setup
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      matrix:
        app: [api, web]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push ${{ matrix.app }} image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./apps/${{ matrix.app }}/Dockerfile
          push: true
          build-args: |
            VITE_API_URL=https://api.fuelripple.com/api/v1
          tags: |
            ${{ secrets.ACR_LOGIN_SERVER }}/fuelripple-${{ matrix.app }}:${{ needs.setup.outputs.image_tag }}
            ${{ needs.setup.outputs.push_latest == 'true' && format('{0}/fuelripple-{1}:latest', secrets.ACR_LOGIN_SERVER, matrix.app) || '' }}
          cache-from: type=gha,scope=fuelripple-${{ matrix.app }}
          cache-to: type=gha,mode=max,scope=fuelripple-${{ matrix.app }}

      - name: Image push summary
        run: |
          echo "### ${{ matrix.app }} pushed :rocket:" >> $GITHUB_STEP_SUMMARY
          echo "- **Image**: \`fuelripple-${{ matrix.app }}:${{ needs.setup.outputs.image_tag }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Registry**: \`${{ secrets.ACR_LOGIN_SERVER }}\`" >> $GITHUB_STEP_SUMMARY

  # ---------------------------------------------------------------------------
  # Job: deploy
  # Updates the App Service container image and restarts each instance.
  # ---------------------------------------------------------------------------
  deploy:
    name: Deploy (${{ matrix.app }})
    needs: [setup, build-and-push]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    strategy:
      matrix:
        include:
          - app: api
            health_url: https://api.fuelripple.com/health
          - app: web
            health_url: https://www.fuelripple.com/

    steps:
      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_19B9CF6E5E8F4F62B5FD4D18E54C5600 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_2C00FBAC276C4F1ABC367E552374A0CA }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_43645EA172E34549B2664D9DDDEFE163 }}

      - name: Update ${{ matrix.app }} container image
        run: |
          ENV="${{ needs.setup.outputs.environment }}"
          APP_NAME="app-${{ matrix.app }}-fuelripple-wford-${ENV}"
          IMAGE="${{ secrets.ACR_LOGIN_SERVER }}/fuelripple-${{ matrix.app }}:${{ needs.setup.outputs.image_tag }}"

          az webapp config container set \
            --name "$APP_NAME" \
            --resource-group "${{ env.RESOURCE_GROUP }}" \
            --container-image-name "$IMAGE" \
            --output none

          az webapp restart \
            --name "$APP_NAME" \
            --resource-group "${{ env.RESOURCE_GROUP }}" \
            --output none

          echo "Deployed $IMAGE to $APP_NAME"

      - name: Health check
        run: |
          URL="${{ matrix.health_url }}"
          echo "Health checking $URL ..."
          sleep 20

          for i in $(seq 1 10); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$URL" || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "${{ matrix.app }} is healthy (HTTP 200)"
              echo "### ${{ matrix.app }} deployed :white_check_mark:" >> $GITHUB_STEP_SUMMARY
              echo "- **URL**: $URL" >> $GITHUB_STEP_SUMMARY
              echo "- **Image**: \`fuelripple-${{ matrix.app }}:${{ needs.setup.outputs.image_tag }}\`" >> $GITHUB_STEP_SUMMARY
              exit 0
            fi
            echo "Attempt $i/10 - HTTP $STATUS. Retrying in 15s..."
            sleep 15
          done

          echo "WARNING: ${{ matrix.app }} health check did not return 200 after 10 attempts."
          exit 1

  # ---------------------------------------------------------------------------
  # Job: migrate
  # Runs Knex database migrations after containers are live.
  # ---------------------------------------------------------------------------
  migrate:
    name: Database Migrations
    needs: [setup, deploy]
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run database migrations
        env:
          DATABASE_URL: postgresql://fuelripple:${{ secrets.DB_PASSWORD }}@psql-fuelripple-wford-${{ needs.setup.outputs.environment }}.postgres.database.azure.com:5432/gastracker?sslmode=require
        run: npm run db:migrate

      - name: Migration summary
        run: |
          echo "### Migrations applied :white_check_mark:" >> $GITHUB_STEP_SUMMARY
          echo "- **Environment**: \`${{ needs.setup.outputs.environment }}\`" >> $GITHUB_STEP_SUMMARY
