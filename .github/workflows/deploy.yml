# ============================================================
# FuelRipple — Build, Push to ACR, Deploy to Azure App Service
# Triggers on push to main (prod) and develop (dev)
# ============================================================

name: Build & Deploy

on:
  push:
    branches: [main, develop]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - prod

permissions:
  id-token: write   # OIDC for Azure login
  contents: read

env:
  ACR_NAME_DEV: acrfuelrippledev
  ACR_NAME_PROD: acrfuelrippleprod
  RESOURCE_GROUP_DEV: rg-fuelripple-dev
  RESOURCE_GROUP_PROD: rg-fuelripple-prod

jobs:
  # ─── Determine environment ───
  setup:
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.env.outputs.environment }}
      acr_name: ${{ steps.env.outputs.acr_name }}
      resource_group: ${{ steps.env.outputs.resource_group }}
      image_tag: ${{ steps.env.outputs.image_tag }}
    steps:
      - name: Determine environment
        id: env
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            ENV="${{ github.event.inputs.environment }}"
          elif [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            ENV="prod"
          else
            ENV="dev"
          fi

          if [[ "$ENV" == "prod" ]]; then
            echo "acr_name=${{ env.ACR_NAME_PROD }}" >> $GITHUB_OUTPUT
            echo "resource_group=${{ env.RESOURCE_GROUP_PROD }}" >> $GITHUB_OUTPUT
          else
            echo "acr_name=${{ env.ACR_NAME_DEV }}" >> $GITHUB_OUTPUT
            echo "resource_group=${{ env.RESOURCE_GROUP_DEV }}" >> $GITHUB_OUTPUT
          fi

          echo "environment=$ENV" >> $GITHUB_OUTPUT
          echo "image_tag=sha-$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT

  # ─── Build & Push Docker images ───
  build:
    runs-on: ubuntu-latest
    needs: setup
    environment: ${{ needs.setup.outputs.environment }}
    strategy:
      matrix:
        app: [api, web]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Log in to ACR
        run: az acr login --name ${{ needs.setup.outputs.acr_name }}

      - name: Build and push ${{ matrix.app }} image
        run: |
          ACR=${{ needs.setup.outputs.acr_name }}.azurecr.io
          TAG=${{ needs.setup.outputs.image_tag }}

          docker build \
            -f apps/${{ matrix.app }}/Dockerfile \
            -t $ACR/fuelripple-${{ matrix.app }}:$TAG \
            -t $ACR/fuelripple-${{ matrix.app }}:latest \
            .

          docker push $ACR/fuelripple-${{ matrix.app }}:$TAG
          docker push $ACR/fuelripple-${{ matrix.app }}:latest

  # ─── Deploy Infrastructure (Bicep) ───
  infra:
    runs-on: ubuntu-latest
    needs: [setup, build]
    environment: ${{ needs.setup.outputs.environment }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Create resource group if not exists
        run: |
          az group create \
            --name ${{ needs.setup.outputs.resource_group }} \
            --location eastus2 \
            --tags project=fuelripple environment=${{ needs.setup.outputs.environment }}

      - name: Deploy Bicep template
        run: |
          az deployment group create \
            --resource-group ${{ needs.setup.outputs.resource_group }} \
            --template-file infra/main.bicep \
            --parameters infra/parameters/${{ needs.setup.outputs.environment }}.bicepparam \
            --parameters \
              apiImageTag=${{ needs.setup.outputs.image_tag }} \
              webImageTag=${{ needs.setup.outputs.image_tag }} \
              dbPassword="${{ secrets.DB_PASSWORD }}" \
              eiaApiKey="${{ secrets.EIA_API_KEY }}" \
              fredApiKey="${{ secrets.FRED_API_KEY }}"

  # ─── Deploy containers to App Service ───
  deploy:
    runs-on: ubuntu-latest
    needs: [setup, build, infra]
    environment: ${{ needs.setup.outputs.environment }}
    strategy:
      matrix:
        include:
          - app: api
            app_name_prefix: app-api
          - app: web
            app_name_prefix: app-web
    steps:
      - name: Log in to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy ${{ matrix.app }} container
        run: |
          ACR=${{ needs.setup.outputs.acr_name }}.azurecr.io
          TAG=${{ needs.setup.outputs.image_tag }}
          ENV=${{ needs.setup.outputs.environment }}
          APP_NAME="${{ matrix.app_name_prefix }}-fuelripple-${ENV}"
          RG=${{ needs.setup.outputs.resource_group }}

          az webapp config container set \
            --name $APP_NAME \
            --resource-group $RG \
            --container-image-name $ACR/fuelripple-${{ matrix.app }}:$TAG \
            --container-registry-url https://$ACR

          az webapp restart \
            --name $APP_NAME \
            --resource-group $RG

  # ─── Run database migrations ───
  migrate:
    runs-on: ubuntu-latest
    needs: [setup, deploy]
    environment: ${{ needs.setup.outputs.environment }}
    if: contains(fromJSON('["api"]'), 'api')
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run migrations
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: npm run db:migrate

  # ─── Smoke test ───
  smoke-test:
    runs-on: ubuntu-latest
    needs: [setup, deploy, migrate]
    steps:
      - name: Health check API
        run: |
          ENV=${{ needs.setup.outputs.environment }}
          URL="https://app-api-fuelripple-${ENV}.azurewebsites.net/health"
          echo "Checking $URL"
          
          for i in {1..10}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$URL" || true)
            if [[ "$STATUS" == "200" ]]; then
              echo "API is healthy (attempt $i)"
              exit 0
            fi
            echo "Attempt $i: status $STATUS, retrying in 15s..."
            sleep 15
          done
          echo "API health check failed after 10 attempts"
          exit 1

      - name: Health check Web
        run: |
          ENV=${{ needs.setup.outputs.environment }}
          URL="https://app-web-fuelripple-${ENV}.azurewebsites.net/"
          echo "Checking $URL"
          
          for i in {1..5}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$URL" || true)
            if [[ "$STATUS" == "200" ]]; then
              echo "Web is healthy (attempt $i)"
              exit 0
            fi
            echo "Attempt $i: status $STATUS, retrying in 10s..."
            sleep 10
          done
          echo "Web health check failed"
          exit 1
