# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy container app to Azure Web App - app-api-fuelripple-wford-dev

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to container registry
        uses: docker/login-action@v2
        with:
          registry: acrfuelripplewforddev.azurecr.io/
          username: ${{ secrets.AZUREAPPSERVICE_CONTAINERUSERNAME_43E14EDEC9164D5790F28F0A117D6A5C }}
          password: ${{ secrets.AZUREAPPSERVICE_CONTAINERPASSWORD_0D9DB754CA4A417AABD8621CAEE66564 }}

      - name: Build and push container image to registry
        uses: docker/build-push-action@v3
        with:
          context: .
          push: true
          tags: acrfuelripplewforddev.azurecr.io/${{ secrets.AZUREAPPSERVICE_CONTAINERUSERNAME_43E14EDEC9164D5790F28F0A117D6A5C }}/fuelripple-api:${{ github.sha }}
          file: ./Dockerfile

  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write #This is required for requesting the JWT
      contents: read #This is required for actions/checkout

    needs: build
    
    steps:
      
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_19B9CF6E5E8F4F62B5FD4D18E54C5600 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_2C00FBAC276C4F1ABC367E552374A0CA }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_43645EA172E34549B2664D9DDDEFE163 }}

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v2
        with:
          app-name: 'app-api-fuelripple-wford-dev'
          slot-name: 'Production'
          images: 'acrfuelripplewforddev.azurecr.io/${{ secrets.AZUREAPPSERVICE_CONTAINERUSERNAME_43E14EDEC9164D5790F28F0A117D6A5C }}/fuelripple-api:${{ github.sha }}'
          