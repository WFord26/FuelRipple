# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy container app to Azure Web App - app-web-fuelripple-wford-dev

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to container registry
        uses: docker/login-action@v2
        with:
          registry: acrfuelripplewforddev.azurecr.io/
          username: ${{ secrets.AZUREAPPSERVICE_CONTAINERUSERNAME_141CC0293FE34123BA98459E52063084 }}
          password: ${{ secrets.AZUREAPPSERVICE_CONTAINERPASSWORD_901F7FA15F7F4574A105C36C55567FA5 }}

      - name: Build and push container image to registry
        uses: docker/build-push-action@v3
        with:
          context: .
          push: true
          tags: acrfuelripplewforddev.azurecr.io/${{ secrets.AZUREAPPSERVICE_CONTAINERUSERNAME_141CC0293FE34123BA98459E52063084 }}/fuelripple-web:${{ github.sha }}
          file: ./Dockerfile

  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write #This is required for requesting the JWT
      contents: read #This is required for actions/checkout

    needs: build
    
    steps:
      
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_20F5C04E9D304D88841859B32D8905C0 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_BAAEC65EB45F4A02BC42CE193FD9B1F8 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_ED861A7E483C46CBA08FADDEECC7DF28 }}

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v2
        with:
          app-name: 'app-web-fuelripple-wford-dev'
          slot-name: 'Production'
          images: 'acrfuelripplewforddev.azurecr.io/${{ secrets.AZUREAPPSERVICE_CONTAINERUSERNAME_141CC0293FE34123BA98459E52063084 }}/fuelripple-web:${{ github.sha }}'
          