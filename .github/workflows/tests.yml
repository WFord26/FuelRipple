# =============================================================================
# tests.yml
# Runs the full test suite (all workspaces via Turbo) on every PR and push.
# Spins up Postgres + Redis service containers for API integration tests.
# The deploy.yml workflow gates on its own embedded test job; this workflow
# provides early feedback on PRs before images are built.
# =============================================================================

name: Tests

on:
  push:
    branches: [beta, develop]
    paths:
      - 'apps/**'
      - 'packages/**'
      - 'package.json'
      - 'package-lock.json'
      - 'turbo.json'
  pull_request:
    branches: [main, beta, develop]

jobs:
  # ---------------------------------------------------------------------------
  # Job: test
  # Runs the full Turbo test suite with coverage. Spins up Postgres + Redis
  # service containers to support integration tests in apps/api.
  # ---------------------------------------------------------------------------
  test:
    name: Test
    runs-on: ubuntu-latest
    permissions:
      contents: read

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: fuelripple_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      # -----------------------------------------------------------------------
      # 1. Checkout
      # -----------------------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # -----------------------------------------------------------------------
      # 2. Set up Node.js with npm cache
      # -----------------------------------------------------------------------
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # -----------------------------------------------------------------------
      # 3. Install dependencies (clean install from lockfile)
      # -----------------------------------------------------------------------
      - name: Install dependencies
        run: npm ci

      # -----------------------------------------------------------------------
      # 4. Run tests with coverage across all workspaces
      # -----------------------------------------------------------------------
      - name: Run tests with coverage
        run: npm run test:coverage
        env:
          DATABASE_URL: postgres://test_user:test_password@localhost:5432/fuelripple_test
          REDIS_URL: redis://localhost:6379
          NODE_ENV: test

      # -----------------------------------------------------------------------
      # 5. Upload coverage report as artifact
      # -----------------------------------------------------------------------
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/
          retention-days: 14
