<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <!-- Background -->
  <rect width="1200" height="630" fill="#0f172a"/>
  <!-- Subtle grid lines -->
  <line x1="0" y1="210" x2="1200" y2="210" stroke="#1e293b" stroke-width="1"/>
  <line x1="0" y1="420" x2="1200" y2="420" stroke="#1e293b" stroke-width="1"/>
  <line x1="400" y1="0" x2="400" y2="630" stroke="#1e293b" stroke-width="1"/>
  <line x1="800" y1="0" x2="800" y2="630" stroke="#1e293b" stroke-width="1"/>

  <!-- Accent bar -->
  <rect x="0" y="0" width="8" height="630" fill="#3b82f6"/>

  <!-- Gas pump icon -->
  <g transform="translate(80, 185) scale(1.4)">
    <rect x="14" y="22" width="22" height="28" rx="3" fill="#3b82f6"/>
    <rect x="18" y="26" width="14" height="8" rx="1.5" fill="#1e3a5f"/>
    <path d="M36 28 L44 28 L44 22" stroke="#94a3b8" stroke-width="2.5" stroke-linecap="round" fill="none"/>
    <rect x="41" y="18" width="5" height="6" rx="1.5" fill="#94a3b8"/>
    <rect x="18" y="38" width="14" height="8" rx="1.5" fill="#1d4ed8"/>
    <rect x="12" y="50" width="26" height="3" rx="1.5" fill="#1e293b"/>
  </g>

  <!-- App name -->
  <text x="220" y="285" font-family="system-ui, sans-serif" font-size="72" font-weight="800" fill="white">GasTrack</text>

  <!-- Tagline -->
  <text x="220" y="345" font-family="system-ui, sans-serif" font-size="28" fill="#94a3b8">Real-time US Gas Price Intelligence</text>

  <!-- Data source badges -->
  <rect x="220" y="380" width="100" height="32" rx="16" fill="#1e3a5f"/>
  <text x="270" y="401" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#60a5fa" text-anchor="middle">EIA Data</text>

  <rect x="332" y="380" width="100" height="32" rx="16" fill="#1a2e1a"/>
  <text x="382" y="401" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#4ade80" text-anchor="middle">AAA Data</text>

  <rect x="444" y="380" width="150" height="32" rx="16" fill="#2d1a10"/>
  <text x="519" y="401" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#fb923c" text-anchor="middle">50 States + DC</text>

  <!-- Decorative bar chart (right side) -->
  <g transform="translate(780, 100)">
    <rect x="0"   y="320" width="48" height="110" rx="4" fill="#3b82f6" opacity="0.8"/>
    <rect x="68"  y="270" width="48" height="160" rx="4" fill="#10b981" opacity="0.8"/>
    <rect x="136" y="190" width="48" height="240" rx="4" fill="#f59e0b" opacity="0.8"/>
    <rect x="204" y="230" width="48" height="200" rx="4" fill="#8b5cf6" opacity="0.8"/>
    <rect x="272" y="80"  width="48" height="350" rx="4" fill="#ef4444" opacity="0.8"/>
    <!-- X-axis -->
    <line x1="-10" y1="430" x2="340" y2="430" stroke="#334155" stroke-width="2"/>
    <!-- Labels -->
    <text x="24"  y="455" font-family="system-ui, sans-serif" font-size="12" fill="#64748b" text-anchor="middle">EC</text>
    <text x="92"  y="455" font-family="system-ui, sans-serif" font-size="12" fill="#64748b" text-anchor="middle">MW</text>
    <text x="160" y="455" font-family="system-ui, sans-serif" font-size="12" fill="#64748b" text-anchor="middle">GC</text>
    <text x="228" y="455" font-family="system-ui, sans-serif" font-size="12" fill="#64748b" text-anchor="middle">RM</text>
    <text x="296" y="455" font-family="system-ui, sans-serif" font-size="12" fill="#64748b" text-anchor="middle">WC</text>
  </g>

  <!-- Bottom strip -->
  <rect x="0" y="590" width="1200" height="40" fill="#1e293b"/>
  <text x="600" y="615" font-family="system-ui, sans-serif" font-size="16" fill="#475569" text-anchor="middle">Powered by EIA · AAA · TimescaleDB</text>
</svg>
